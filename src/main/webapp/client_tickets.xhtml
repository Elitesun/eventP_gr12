<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/template.xhtml">
    <ui:define name="pageTitle">Mes Tickets</ui:define>
    <ui:define name="head">
        <style>
            @media print {
                /* Masquer tout par défaut */
                body * {
                    visibility: hidden;
                }
                /* Afficher uniquement la zone de ticket sélectionnée */
                .printable-ticket-area, .printable-ticket-area * {
                    visibility: visible;
                }
                .printable-ticket-area {
                    position: absolute;
                    left: 0;
                    top: 0;
                    width: 100%;
                    padding: 20px;
                    border: 2px solid #000;
                    text-align: center;
                }
                /* Cacher les boutons d'action et autres éléments inutiles pendant l'impression */
                .no-print {
                    display: none !important;
                }
            }
        </style>
        <script>
            //<![CDATA[
            function printTicket(evenement, date, lieu, qrSrc) {
                const printWindow = window.open('', '_blank', 'width=600,height=600');
                printWindow.document.write('<html><head><title>Impression Billet</title>');
                printWindow.document.write('<style>body{font-family:sans-serif;text-align:center;padding:40px;} .ticket{border:2px solid #333;padding:30px;border-radius:15px;display:inline-block;} h1{color:#0047FF;} img{width:200px;margin-top:20px;}</style>');
                printWindow.document.write('</head><body>');
                printWindow.document.write('<div class="ticket">');
                printWindow.document.write('<h1>' + evenement + '</h1>');
                printWindow.document.write('<p><strong>Date :</strong> ' + date + '</p>');
                printWindow.document.write('<p><strong>Lieu :</strong> ' + lieu + '</p>');
                printWindow.document.write('<img src="' + qrSrc + '" />');
                printWindow.document.write('</div>');
                printWindow.document.write('<script>window.onload = function() { window.print(); window.close(); };<\/script>');
                printWindow.document.write('</body></html>');
                printWindow.document.close();
            }
            //]]>
        </script>
    </ui:define>
    <ui:define name="content">
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-md-12">
                            <h1 class="mb-4">
                                <i class="fas fa-ticket-alt"></i>
                                Mes Tickets
                            </h1>

                            <!-- Messages -->
                            <p:messages id="messages" showDetail="true" showSummary="false" closable="true"/>



                            <!-- Liste des tickets -->
                            <h:form id="ticketsForm">
                            <p:dataTable id="ticketsTable"
                                       value="#{clientTicketController.ticketsClient}"
                                       var="ticket"
                                       paginator="true"
                                       rows="10"
                                       paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink}"
                                       currentPageReportTemplate="Tickets {startRecord}-{endRecord} sur {totalRecords}"
                                       emptyMessage="Vous n'avez encore acheté aucun ticket">

                                <p:column headerText="Événement" sortBy="#{ticket.evenement.titre}">
                                    <h:outputText value="#{ticket.evenement.titre}"/>
                                </p:column>

                                <p:column headerText="Date de l'événement" sortBy="#{ticket.evenement.dateEvenement}">
                                    <h:outputText value="#{ticket.evenement.dateEvenement}">
                                        <f:convertDateTime pattern="dd/MM/yyyy HH:mm"/>
                                    </h:outputText>
                                </p:column>

                                <p:column headerText="Lieu">
                                    <h:outputText value="#{ticket.evenement.lieu}"/>
                                </p:column>

                                <p:column headerText="Prix">
                                    <h:outputText value="#{ticket.evenement.prixTicket} €"/>
                                </p:column>

                                <p:column headerText="Date d'achat">
                                    <h:outputText value="#{ticket.dateAchat}">
                                        <f:convertDateTime pattern="dd/MM/yyyy HH:mm"/>
                                    </h:outputText>
                                </p:column>

                                <p:column headerText="Statut">
                                    <p:badge value="#{clientTicketController.getLibelleStatut(ticket)}"
                                           severity="#{ticket.statut.name() eq 'VENDU' ? 'success' :
                                                      ticket.statut.name() eq 'UTILISE' ? 'secondary' :
                                                      ticket.statut.name() eq 'ANNULE' ? 'danger' : 'info'}"/>
                                </p:column>

                                <p:column headerText="Billet (QR Code)" style="width: 220px; text-align: center;">
                                    <h:panelGroup rendered="#{ticket.statut.name() ne 'ANNULE'}">
                                        <!-- QR normal (VENDU) -->
                                        <h:panelGroup rendered="#{ticket.statut.name() eq 'VENDU'}">
                                            <div style="position: relative; display: inline-block;">
                                                <img src="#{ticket.qrCodeImage}" alt="QR Code"
                                                     style="width: 120px; height: 120px; border: 1px solid #ddd; padding: 5px; border-radius: 8px;"/>
                                            </div>
                                        </h:panelGroup>
                                        <!-- QR grisé + bandeau UTILISÉ -->
                                        <h:panelGroup rendered="#{ticket.statut.name() eq 'UTILISE'}">
                                            <div style="position: relative; display: inline-block;">
                                                <img src="#{ticket.qrCodeImage}" alt="QR Code"
                                                     style="width: 120px; height: 120px; border: 1px solid #ddd; padding: 5px; border-radius: 8px; opacity: 0.6; filter: grayscale(80%);"/>
                                                <div style="position: absolute; top: 40px; left: -5px; right: -5px;
                                                            background: rgba(220,53,69,0.85); color: white;
                                                            font-weight: 700; font-size: 12px;
                                                            padding: 4px 0; text-align: center; border-radius: 4px;
                                                            transform: rotate(-8deg);">
                                                    ✓ UTILISÉ
                                                </div>
                                            </div>
                                        </h:panelGroup>
                                        <!-- Code texte toujours visible -->
                                        <div style="margin-top: 8px; font-family: monospace; font-size: 11px; color: #555;
                                                    background: #f8f9fa; padding: 6px 10px; border-radius: 6px;
                                                    border: 1px dashed #ccc; word-break: break-all;">
                                            #{ticket.codeQr}
                                        </div>
                                    </h:panelGroup>
                                    <h:panelGroup rendered="#{ticket.statut.name() eq 'ANNULE'}">
                                        <span style="color: #dc3545; font-weight: 600;">Ticket annulé</span>
                                    </h:panelGroup>
                                </p:column>

                                <p:column headerText="Actions" style="width: 150px">
                                    <p:commandButton value="Imprimer"
                                                   icon="fas fa-print"
                                                   onclick="printTicket('#{ticket.evenement.titre}', '#{ticket.evenement.dateEvenement}', '#{ticket.evenement.lieu}', '#{ticket.qrCodeImage}')"
                                                   styleClass="btn btn-sm btn-info"
                                                   rendered="#{ticket.statut.name() ne 'ANNULE'}"/>
                                </p:column>
                            </p:dataTable>
                            </h:form>

                            <!-- Statistiques -->
                            <div class="row mt-4">
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title">Total Tickets</h5>
                                            <h3 class="text-primary">
                                                <h:outputText value="#{clientTicketController.ticketsClient.size()}"/>
                                            </h3>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title">Tickets Valides</h5>
                                            <h3 class="text-success">
                                                <h:outputText value="#{clientTicketController.ticketsClient.stream().filter(t -> t.statut.name() eq 'VENDU').count()}"/>
                                            </h3>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title">Tickets Utilisés</h5>
                                            <h3 class="text-secondary">
                                                <h:outputText value="#{clientTicketController.ticketsClient.stream().filter(t -> t.statut.name() eq 'UTILISE').count()}"/>
                                            </h3>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="card text-center">
                                        <div class="card-body">
                                            <h5 class="card-title">Tickets Annulés</h5>
                                            <h3 class="text-danger">
                                                <h:outputText value="#{clientTicketController.ticketsClient.stream().filter(t -> t.statut.name() eq 'ANNULE').count()}"/>
                                            </h3>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </ui:define>
</ui:composition>
