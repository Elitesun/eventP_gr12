<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/template.xhtml">
    <ui:define name="pageTitle">Gestion des Événements</ui:define>
    <ui:define name="content">
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-md-12">
                            <h1 class="mb-4">
                                <i class="fas fa-calendar-alt"></i>
                                Gestion des Événements
                            </h1>

                            <!-- Messages -->
                            <p:messages id="messages" showDetail="true" showSummary="false" closable="true"/>

                            <!-- Bouton pour créer un nouvel événement -->
                            <h:form id="createButtonForm">
                                <div class="mb-3">
                                    <p:commandButton value="Créer un nouvel événement"
                                                   icon="fas fa-plus"
                                                   action="#{evenementController.preparerCreation}"
                                                   update="@form"
                                                   styleClass="btn btn-primary"/>
                                </div>
                            </h:form>

                            <!-- Formulaire de création/modification -->
                            <p:panel id="formPanel" header="#{evenementController.modeCreation ? 'Créer un événement' : 'Modifier un événement'}"
                                    styleClass="mb-4" collapsed="false">

                                <h:form id="evenementForm">
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label for="titre">Titre *</label>
                                                <p:inputText id="titre"
                                                           value="#{evenementController.nouvelEvenement.titre}"
                                                           required="true"
                                                           maxlength="200"
                                                           styleClass="form-control"/>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label for="lieu">Lieu *</label>
                                                <p:inputText id="lieu"
                                                           value="#{evenementController.nouvelEvenement.lieu}"
                                                           required="true"
                                                           maxlength="300"
                                                           styleClass="form-control"/>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label for="description">Description *</label>
                                        <p:inputTextarea id="description"
                                                       value="#{evenementController.nouvelEvenement.description}"
                                                       required="true"
                                                       rows="4"
                                                       maxlength="2000"
                                                       styleClass="form-control"/>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-4">
                                            <div class="form-group">
                                                <label for="dateEvenement">Date de l'événement *</label>
                                                <p:calendar id="dateEvenement"
                                                          value="#{evenementController.nouvelEvenement.dateEvenement}"
                                                          required="true"
                                                          pattern="dd/MM/yyyy HH:mm"
                                                          showTime="true"
                                                          styleClass="form-control"/>
                                            </div>
                                        </div>
                                        <div class="col-md-4">
                                            <div class="form-group">
                                                <label for="prixTicket">Prix par ticket (€) *</label>
                                                <p:inputNumber id="prixTicket"
                                                             value="#{evenementController.nouvelEvenement.prixTicket}"
                                                             required="true"
                                                             minValue="0"
                                                             maxValue="10000"
                                                             styleClass="form-control"/>
                                            </div>
                                        </div>
                                        <div class="col-md-4">
                                            <div class="form-group">
                                                <label for="nombreTickets">Nombre de tickets *</label>
                                                <p:inputNumber id="nombreTickets"
                                                             value="#{evenementController.nouvelEvenement.nombreTicketsTotal}"
                                                             required="true"
                                                             minValue="1"
                                                             maxValue="100000"
                                                             styleClass="form-control"/>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <p:commandButton value="#{evenementController.modeCreation ? 'Créer l\'événement' : 'Modifier l\'événement'}"
                                                       icon="fas fa-save"
                                                       action="#{evenementController.sauvegarderEvenement}"
                                                       update="@form,messages,:eventsForm:evenementsTable"
                                                       styleClass="btn btn-success"/>
                                        <p:commandButton value="Annuler"
                                                       icon="fas fa-times"
                                                       action="#{evenementController.preparerCreation}"
                                                       update="@form"
                                                       styleClass="btn btn-secondary ml-2"/>
                                    </div>
                                </h:form>
                            </p:panel>

                            <!-- Liste des événements -->
                            <h:form id="eventsForm">
                                <p:dataTable id="evenementsTable"
                                           value="#{evenementController.evenements}"
                                           var="evenement"
                                           paginator="true"
                                           rows="10"
                                           paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink}"
                                           currentPageReportTemplate="Événements {startRecord}-{endRecord} sur {totalRecords}"
                                           emptyMessage="Aucun événement trouvé">

                                <p:column headerText="Titre" sortBy="#{evenement.titre}">
                                    <h:outputText value="#{evenement.titre}"/>
                                </p:column>

                                <p:column headerText="Date" sortBy="#{evenement.dateEvenement}">
                                    <h:outputText value="#{evenement.dateEvenement}">
                                        <f:convertDateTime pattern="dd/MM/yyyy HH:mm"/>
                                    </h:outputText>
                                </p:column>

                                <p:column headerText="Lieu">
                                    <h:outputText value="#{evenement.lieu}"/>
                                </p:column>

                                <p:column headerText="Prix">
                                    <h:outputText value="#{evenement.prixTicket} €"/>
                                </p:column>

                                <p:column headerText="Tickets">
                                    <span class="badge badge-info">
                                        #{evenement.ticketsVendus}/#{evenement.nombreTicketsTotal}
                                    </span>
                                </p:column>

                                <p:column headerText="Statut">
                                    <p:badge value="#{evenement.statut.name()}"
                                           severity="#{evenement.statut.name() eq 'PUBLIE' ? 'success' :
                                                      evenement.statut.name() eq 'BROUILLON' ? 'info' :
                                                      evenement.statut.name() eq 'ANNULE' ? 'danger' : 'secondary'}"/>
                                </p:column>

                                <p:column headerText="Actions" style="width: 200px">
                                    <div class="btn-group">
                                        <p:commandButton value="Modifier"
                                                       icon="fas fa-edit"
                                                       action="#{evenementController.preparerModification(evenement)}"
                                                       update="@form,messages"
                                                       styleClass="btn btn-sm btn-warning"/>

                                        <p:commandButton value="Publier"
                                                       icon="fas fa-check"
                                                       action="#{evenementController.publierEvenement(evenement)}"
                                                       update="evenementsTable,messages"
                                                       styleClass="btn btn-sm btn-success"
                                                       rendered="#{evenement.statut.name() eq 'BROUILLON'}"/>

                                        <p:commandButton value="Annuler"
                                                       icon="fas fa-ban"
                                                       action="#{evenementController.annulerEvenement(evenement)}"
                                                       update="evenementsTable,messages"
                                                       styleClass="btn btn-sm btn-danger"
                                                       rendered="#{evenement.statut.name() eq 'PUBLIE'}"/>

                                        <p:commandButton value="Supprimer"
                                                       icon="fas fa-trash"
                                                       action="#{evenementController.supprimerEvenement(evenement)}"
                                                       update="evenementsTable,messages"
                                                       styleClass="btn btn-sm btn-danger"
                                                       rendered="#{evenement.statut.name() eq 'BROUILLON'}"/>
                                    </div>
                                </p:column>
                            </p:dataTable>
                            </h:form>

                            <h:panelGroup rendered="#{empty evenementController.evenements}">
                                <div class="alert alert-info mt-4">
                                    Aucun événement défini pour le moment. Utilisez le formulaire ci-dessus pour en ajouter un.
                                </div>
                            </h:panelGroup>
                        </div>
                    </div>
                </div>
            </ui:define>
</ui:composition>
