<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:h="jakarta.faces.html"
  xmlns:f="jakarta.faces.core"
  xmlns:ui="jakarta.faces.facelets"
  xmlns:p="http://primefaces.org/ui"
  template="/WEB-INF/public_template.xhtml"
>
  <ui:define name="title">Inscription - GreenPulse Events</ui:define>

  <ui:define name="head">
    <h:outputStylesheet library="css" name="register.css" />
  </ui:define>

  <ui:define name="content">
    <div class="register-page">
      <div class="register-card">
        <div class="register-head">
          <h1>Créer un compte</h1>
          <p>Inscrivez-vous pour continuer sur GreenPulse Events.</p>
        </div>

        <h:panelGroup rendered="#{not empty facesContext.messageList}">
          <p:messages
            id="messages"
            globalOnly="true"
            showDetail="true"
            closable="true"
          />
        </h:panelGroup>

        <div class="register-tabs" role="tablist" aria-label="Type de compte">
          <button
            type="button"
            class="tab-btn active"
            onclick="switchTab(event, 'client')"
          >
            Client
          </button>
          <button
            type="button"
            class="tab-btn"
            onclick="switchTab(event, 'organisateur')"
          >
            Organisateur
          </button>
        </div>

        <div id="client" class="tab-panel active">
          <h:form id="clientForm" styleClass="simple-form">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Nom *</label>
                <h:inputText
                  id="clientNom"
                  value="#{registerController.nom}"
                  required="true"
                  requiredMessage="Le nom est obligatoire"
                  styleClass="form-input"
                />
                <h:message for="clientNom" styleClass="error-message" />
              </div>
              <div class="form-group">
                <label class="form-label">Prénom *</label>
                <h:inputText
                  id="clientPrenom"
                  value="#{registerController.prenom}"
                  required="true"
                  requiredMessage="Le prénom est obligatoire"
                  styleClass="form-input"
                />
                <h:message for="clientPrenom" styleClass="error-message" />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Email *</label>
              <h:inputText
                id="clientEmail"
                value="#{registerController.email}"
                required="true"
                requiredMessage="L'email est obligatoire"
                styleClass="form-input"
              >
                <f:ajax event="blur" render="clientEmailMsg" />
              </h:inputText>
              <h:message
                id="clientEmailMsg"
                for="clientEmail"
                styleClass="error-message"
              />
            </div>

            <div class="form-group">
              <label class="form-label">Téléphone *</label>
              <h:inputText
                id="clientTelephone"
                value="#{registerController.telephone}"
                required="true"
                requiredMessage="Le téléphone est obligatoire"
                styleClass="form-input"
              />
              <h:message for="clientTelephone" styleClass="error-message" />
            </div>

            <div class="form-group">
              <label class="form-label">Mot de passe *</label>
              <h:inputSecret
                id="clientMotDePasse"
                value="#{registerController.motDePasse}"
                required="true"
                requiredMessage="Le mot de passe est obligatoire"
                styleClass="form-input"
              />
              <h:message for="clientMotDePasse" styleClass="error-message" />
            </div>

            <div class="form-group">
              <label class="form-label">Confirmer le mot de passe *</label>
              <h:inputSecret
                id="clientConfirmMDP"
                value="#{registerController.confirmPassword}"
                required="true"
                requiredMessage="Confirmation du mot de passe obligatoire"
                styleClass="form-input"
              />
              <h:message for="clientConfirmMDP" styleClass="error-message" />
            </div>

            <div class="checkbox-row">
              <h:selectBooleanCheckbox
                id="clientAccept"
                value="#{registerController.acceptTerms}"
              />
              <label for="clientAccept"
                >J'accepte les conditions d'utilisation *</label
              >
            </div>

            <h:commandButton
              value="Créer mon compte client"
              action="#{registerController.inscrireClient}"
              styleClass="submit-btn"
            />
          </h:form>
        </div>

        <div id="organisateur" class="tab-panel">
          <h:form id="orgForm" styleClass="simple-form">
            <div class="form-group">
              <label class="form-label">Type d'organisateur *</label>
              <h:selectOneMenu
                id="orgType"
                value="#{registerController.typeOrganisateur}"
                required="true"
                requiredMessage="Le type d'organisateur est obligatoire"
                styleClass="form-input"
                onchange="
                  toggleOrganizerInfo();
                  jsf.ajax.request(this, event, { execute: '@this' });
                "
              >
                <f:selectItem itemValue="" itemLabel="Sélectionnez un type" />
                <f:selectItem
                  itemValue="PHYSIQUE"
                  itemLabel="Personne physique"
                />
                <f:selectItem
                  itemValue="MORALE"
                  itemLabel="Personne morale (entreprise)"
                />
              </h:selectOneMenu>
              <h:message for="orgType" styleClass="error-message" />
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Nom *</label>
                <h:inputText
                  id="orgaNom"
                  value="#{registerController.nom}"
                  required="true"
                  requiredMessage="Le nom est obligatoire"
                  styleClass="form-input"
                />
                <h:message for="orgaNom" styleClass="error-message" />
              </div>
              <div class="form-group">
                <label class="form-label">Prénom *</label>
                <h:inputText
                  id="orgaPrenom"
                  value="#{registerController.prenom}"
                  required="true"
                  requiredMessage="Le prénom est obligatoire"
                  styleClass="form-input"
                />
                <h:message for="orgaPrenom" styleClass="error-message" />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Email *</label>
              <h:inputText
                id="orgaEmail"
                value="#{registerController.email}"
                required="true"
                requiredMessage="L'email est obligatoire"
                styleClass="form-input"
              >
                <f:ajax event="blur" render="orgaEmailMsg" />
              </h:inputText>
              <h:message
                id="orgaEmailMsg"
                for="orgaEmail"
                styleClass="error-message"
              />
            </div>

            <div class="form-group">
              <label class="form-label">Téléphone *</label>
              <h:inputText
                id="orgaTelephone"
                value="#{registerController.telephone}"
                required="true"
                requiredMessage="Le téléphone est obligatoire"
                styleClass="form-input"
              />
              <h:message for="orgaTelephone" styleClass="error-message" />
            </div>

            <div id="moraleInfo" class="organizer-extra">
              <h2 class="section-title">Informations de l'entreprise</h2>

              <div class="form-group">
                <label class="form-label">Nom de l'entreprise *</label>
                <h:inputText
                  id="orgNomEntreprise"
                  value="#{registerController.nomEntreprise}"
                  styleClass="form-input"
                />
                <h:message for="orgNomEntreprise" styleClass="error-message" />
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">SIRET</label>
                  <h:inputText
                    id="orgSIRET"
                    value="#{registerController.numeroSIRET}"
                    styleClass="form-input"
                  />
                </div>
                <div class="form-group">
                  <label class="form-label">Secteur d'activité *</label>
                  <h:inputText
                    id="orgSecteur"
                    value="#{registerController.secteurActivite}"
                    styleClass="form-input"
                  />
                  <h:message for="orgSecteur" styleClass="error-message" />
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">Adresse du siège *</label>
                <h:inputText
                  id="orgAdresse"
                  value="#{registerController.adresseSiege}"
                  styleClass="form-input"
                />
                <h:message for="orgAdresse" styleClass="error-message" />
              </div>

              <div class="form-group">
                <label class="form-label">Site web</label>
                <h:inputText
                  id="orgSiteWeb"
                  value="#{registerController.siteWeb}"
                  styleClass="form-input"
                />
              </div>

              <h2 class="section-title">Représentant</h2>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Prénom du représentant *</label>
                  <h:inputText
                    id="orgRepPrénom"
                    value="#{registerController.prenomRepresentant}"
                    styleClass="form-input"
                  />
                  <h:message for="orgRepPrénom" styleClass="error-message" />
                </div>
                <div class="form-group">
                  <label class="form-label">Nom du représentant *</label>
                  <h:inputText
                    id="orgRepNom"
                    value="#{registerController.nomRepresentant}"
                    styleClass="form-input"
                  />
                  <h:message for="orgRepNom" styleClass="error-message" />
                </div>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Mot de passe *</label>
              <h:inputSecret
                id="orgaMotDePasse"
                value="#{registerController.motDePasse}"
                required="true"
                requiredMessage="Le mot de passe est obligatoire"
                styleClass="form-input"
              />
              <h:message for="orgaMotDePasse" styleClass="error-message" />
            </div>

            <div class="form-group">
              <label class="form-label">Confirmer le mot de passe *</label>
              <h:inputSecret
                id="orgaConfirmMDP"
                value="#{registerController.confirmPassword}"
                required="true"
                requiredMessage="Confirmation du mot de passe obligatoire"
                styleClass="form-input"
              />
              <h:message for="orgaConfirmMDP" styleClass="error-message" />
            </div>

            <div class="checkbox-row">
              <h:selectBooleanCheckbox
                id="orgAccept"
                value="#{registerController.acceptTerms}"
              />
              <label for="orgAccept"
                >J'accepte les conditions d'utilisation *</label
              >
            </div>

            <h:commandButton
              value="Créer mon compte organisateur"
              action="#{registerController.inscrireOrganisateur}"
              styleClass="submit-btn"
            />
          </h:form>
        </div>

        <p class="register-footer">
          Vous avez déjà un compte ?
          <h:link value="Se connecter" outcome="login" />
        </p>
      </div>
    </div>

    <script>
      //<![CDATA[
      function switchTab(event, tabId) {
        event.preventDefault();

        document.querySelectorAll(".tab-panel").forEach(function (panel) {
          panel.classList.remove("active");
        });
        document.querySelectorAll(".tab-btn").forEach(function (button) {
          button.classList.remove("active");
        });

        var targetPanel = document.getElementById(tabId);
        if (targetPanel) {
          targetPanel.classList.add("active");
        }

        var clickedButton = event.currentTarget;
        if (clickedButton) {
          clickedButton.classList.add("active");
        }
      }

      function toggleOrganizerInfo() {
        var typeSelect = document.getElementById("orgForm:orgType");
        var moraleInfo = document.getElementById("moraleInfo");

        if (!typeSelect || !moraleInfo) {
          return;
        }

        if (typeSelect.value === "MORALE") {
          moraleInfo.classList.add("active");
        } else {
          moraleInfo.classList.remove("active");
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        toggleOrganizerInfo();
      });
      //]]>
    </script>
  </ui:define>
</ui:composition>
