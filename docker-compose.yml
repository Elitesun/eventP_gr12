services:
  db:
    image: postgres:16-alpine
    container_name: eventplatform-db
    environment:
      POSTGRES_DB: event_platform
      POSTGRES_USER: eventuser
      POSTGRES_PASSWORD: eventpass123
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventuser -d event_platform"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventplatform-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: event_platform
      DB_USER: eventuser
      DB_PASSWORD: eventpass123
    ports:
      - "8080:8080"
      - "4848:4848"

volumes:
  pg_data:
